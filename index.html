<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ashley in Afrika | Outreach Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    :root {
      --bg: #05050A; --surface: #0A0D14; --card: #121622; --border: #1F2538;
      --text: #F8FAFC; --muted: #94A3B8; --accent: #3B82F6;
      --gradient: linear-gradient(135deg, #3B82F6, #8B5CF6);
      --gradient2: linear-gradient(135deg, #F59E0B, #EF4444);
    }
    body { margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Outfit','DM Sans',sans-serif;-webkit-font-smoothing:antialiased }
    * { box-sizing:border-box }
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1F2538;border-radius:4px}
    button{font-family:inherit}button:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:var(--gradient);color:white;border:none;padding:14px 28px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(59,130,246,.2)}
    .btn-primary:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.4)}
    .btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);padding:14px 28px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s}
    .btn-secondary:not(:disabled):hover{background:var(--border)}
    .status-badge{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;display:inline-block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .animate-up{animation:fadeIn .4s cubic-bezier(.16,1,.3,1) forwards}
    .app-container{display:flex;min-height:100vh;background:var(--bg)}
    .sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
    .sidebar-header{padding:32px 24px}
    .sidebar-nav{padding:0 16px;display:flex;flex-direction:column;gap:6px}
    .content-area{flex:1;padding:48px 64px;height:100vh;overflow-y:auto;overflow-x:hidden}
    .page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px}
    .outreach-grid{display:grid;grid-template-columns:1fr 2fr;gap:32px}
    .desktop-table{display:table;width:100%;border-collapse:collapse}
    .mobile-cards{display:none}
    .pagination-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:var(--surface);border-top:1px solid var(--border)}
    .nav-item{border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;padding:12px 16px;transition:all .2s;font-size:15px}
    .nav-item:hover{background:rgba(255,255,255,.03)}
    .nav-divider{height:1px;background:var(--border);margin:12px 0}
    .tab-bar{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border)}
    .tab-btn{flex:1;padding:10px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
    @media(max-width:850px){
      .app-container{flex-direction:column;height:100vh;overflow:hidden}
      .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);padding-bottom:8px}
      .sidebar-header{padding:16px 20px;display:flex;align-items:center;gap:12px}
      .sidebar-header>div:nth-child(1){margin-bottom:0!important;width:32px!important;height:32px!important;font-size:16px!important}
      .sidebar-header>div:nth-child(3){display:none}
      .sidebar-nav{flex-direction:row;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
      .sidebar-nav::-webkit-scrollbar{display:none}
      .nav-item{white-space:nowrap;font-size:14px!important;padding:10px 16px!important}
      .content-area{padding:24px 16px;height:auto;overflow-y:auto;padding-bottom:80px}
      .page-header{flex-direction:column;align-items:flex-start;gap:16px;margin-bottom:24px}
      .page-header h1{font-size:28px!important}
      .outreach-grid{grid-template-columns:1fr;gap:24px}
      .desktop-table{display:none}
      .mobile-cards{display:flex;flex-direction:column;gap:16px;padding:16px;background:var(--surface)}
      .mobile-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
      .pagination-bar{flex-direction:column;gap:16px;text-align:center;padding:20px 16px}
    }

    /* ═══ AUTH GATE STYLES ═══ */
    #auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif}
    #auth-overlay.hidden{display:none}
    .abox{width:100%;max-width:380px;padding:20px;animation:afIn .6s ease}
    @keyframes afIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .a-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,rgba(59,130,246,.15),rgba(139,92,246,.08));border:2px solid rgba(59,130,246,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px}
    .a-tag{font-size:9px;font-weight:700;letter-spacing:.2em;color:var(--accent);text-transform:uppercase;margin-bottom:6px;text-align:center}
    .a-h1{font-size:22px;font-weight:800;color:var(--text);text-align:center;margin:0}
    .a-sub{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.5}
    .a-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:24px;margin-top:24px;transition:border-color .3s}
    .a-card.err{border-color:rgba(239,68,68,.4)}
    .a-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:8px}
    .a-iw{position:relative;margin-bottom:16px}
    .a-inp{width:100%;padding:12px 44px 12px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.15em;outline:none;box-sizing:border-box;transition:all .2s}
    .a-inp:focus{border-color:rgba(59,130,246,.5)}
    .a-inp:disabled{opacity:.5;background:rgba(239,68,68,.05)}
    .a-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px}
    .a-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#EF4444;font-weight:600;display:none}
    .a-err.vis{display:block}
    .a-lck{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:12px;margin-bottom:14px;text-align:center;display:none}
    .a-lck.vis{display:block}
    .a-lck-l{font-size:9px;font-weight:700;color:#EF4444;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
    .a-lck-t{font-size:22px;font-weight:800;color:#EF4444;font-family:'JetBrains Mono',monospace}
    .a-btn{width:100%;padding:13px 0;border-radius:8px;border:none;background:var(--gradient);color:#fff;font-size:13px;font-weight:700;letter-spacing:.04em;cursor:pointer;text-transform:uppercase;transition:all .2s;font-family:'Outfit',sans-serif}
    .a-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
    .a-btn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.3)}
    .a-dots{display:flex;justify-content:center;gap:4px;margin-top:10px}
    .a-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .3s}
    .a-dot.x{background:#EF4444}
    .a-ft{text-align:center;margin-top:18px;font-size:8px;color:#1F2538;letter-spacing:.08em}
    .sb{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:10px;font-family:'Outfit',sans-serif}
    .sb.hidden{display:none}
    .sb-l{display:flex;align-items:center;gap:8px}
    .sb-d{width:6px;height:6px;border-radius:50%;background:#10B981;box-shadow:0 0 6px rgba(16,185,129,.4)}
    .sb-n{color:var(--text);font-weight:700}
    .sb-b{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2);text-transform:uppercase;letter-spacing:.06em}
    .sb-r{display:flex;align-items:center;gap:10px}
    .sb-t{color:#1F2538}
    .sb-x{padding:2px 8px;border-radius:4px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#EF4444;font-size:9px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;font-family:'Outfit',sans-serif}
    #root{display:none}

  </style>
</head>
<body>

  <div id="auth-overlay"><div class="abox">
    <div class="a-icon">🔒</div><div class="a-tag">AIA Outreach Engine</div>
    <h1 class="a-h1">Authorized Access Only</h1>
    <p class="a-sub">Enter your team access code to continue.</p>
    <div class="a-card" id="acard">
      <label class="a-lbl">Access Code</label>
      <div class="a-iw"><input type="password" id="apin" class="a-inp" placeholder="Enter access code" autofocus><button class="a-eye" id="aeye" onclick="aTP()">◎</button></div>
      <div class="a-err" id="aerr"></div>
      <div class="a-lck" id="alck"><div class="a-lck-l">Account Locked</div><div class="a-lck-t" id="alkt">00:00</div></div>
      <button class="a-btn" id="abtn" onclick="aSub()">Authenticate</button>
      <div class="a-dots" id="adots"></div>
    </div><div class="a-ft">ANTIGRAVITY OPS ENGINE · SECURED ACCESS</div>
  </div></div>
  <div class="sb hidden" id="sbar"><div class="sb-l"><div class="sb-d"></div><span style="color:var(--muted)">Logged in as <span class="sb-n" id="sname"></span></span><span class="sb-b hidden" id="sbadge">Admin</span></div><div class="sb-r"><span class="sb-t" id="stimer"></span><button class="sb-x" onclick="aOut()">Logout</button></div></div>

  <div id="root"></div>

  <script>
  var AU={users:[{name:"Ashley Cleveland",pin:"AIA2026AC",role:"admin"},{name:"Bethel Esamah",pin:"AIA2026BE",role:"admin"},{name:"Gwen L. Miñoza",pin:"AIA2026GM",role:"team"},{name:"Nailah Best",pin:"AIA2026NB",role:"team"}],sm:480,ma:5,lm:15};
  var aA=0,aLU=null,aLI=null,aSI=null,aSP=false;
  function aInit(){try{var s=JSON.parse(sessionStorage.getItem("aia_s"));if(s&&s.exp>Date.now()){aShow(s);return}}catch(e){}try{var lk=JSON.parse(sessionStorage.getItem("aia_lk"));if(lk&&lk.until>Date.now()){aLU=lk.until;aA=lk.a;aStartLk()}}catch(e){}document.getElementById("apin").addEventListener("keydown",function(e){if(e.key==="Enter")aSub()})}
  function aTP(){var i=document.getElementById("apin"),b=document.getElementById("aeye");aSP=!aSP;i.type=aSP?"text":"password";i.style.letterSpacing=aSP?"0.05em":"0.15em";b.textContent=aSP?"◉":"◎"}
  function aSub(){if(aLU&&aLU>Date.now())return;var p=document.getElementById("apin").value.trim(),u=AU.users.find(function(x){return x.pin===p});if(u){var s={name:u.name,role:u.role,at:Date.now(),exp:Date.now()+AU.sm*60000};sessionStorage.setItem("aia_s",JSON.stringify(s));sessionStorage.removeItem("aia_lk");aShow(s)}else{aA++;if(aA>=AU.ma){aLU=Date.now()+AU.lm*60000;sessionStorage.setItem("aia_lk",JSON.stringify({until:aLU,a:aA}));aErr("Locked for "+AU.lm+" minutes.");aStartLk()}else{aErr("Invalid code. "+(AU.ma-aA)+" attempts left.");aDots()}document.getElementById("apin").value=""}}
  function aErr(m){var e=document.getElementById("aerr");e.textContent="⚠ "+m;e.classList.add("vis");document.getElementById("acard").classList.add("err")}
  function aDots(){var e=document.getElementById("adots");e.innerHTML=Array.from({length:AU.ma}).map(function(_,i){return'<div class="a-dot '+(i<aA?"x":"")+'"></div>'}).join("")}
  function aStartLk(){var i=document.getElementById("apin");i.disabled=true;i.placeholder="Locked";document.getElementById("abtn").disabled=true;document.getElementById("alck").classList.add("vis");aLI=setInterval(function(){var r=Math.max(0,aLU-Date.now());if(r<=0){clearInterval(aLI);aLU=null;aA=0;sessionStorage.removeItem("aia_lk");i.disabled=false;i.placeholder="Enter access code";document.getElementById("abtn").disabled=false;document.getElementById("alck").classList.remove("vis");document.getElementById("adots").innerHTML="";document.getElementById("aerr").classList.remove("vis");document.getElementById("acard").classList.remove("err");return}var m=Math.ceil(r/60000),s=Math.ceil((r%60000)/1000);document.getElementById("alkt").textContent=String(m).padStart(2,"0")+":"+String(s).padStart(2,"0")},1000)}
  function aShow(s){document.getElementById("auth-overlay").classList.add("hidden");document.getElementById("root").style.display="block";document.getElementById("sbar").classList.remove("hidden");document.getElementById("sname").textContent=s.name;if(s.role==="admin")document.getElementById("sbadge").classList.remove("hidden");aUpT(s);aSI=setInterval(function(){aUpT(s)},30000)}
  function aUpT(s){var r=Math.max(0,s.exp-Date.now());if(r<=0){aOut();return}document.getElementById("stimer").textContent=Math.floor(r/3600000)+"h "+Math.floor((r%3600000)/60000)+"m"}
  function aOut(){sessionStorage.removeItem("aia_s");clearInterval(aSI);location.reload()}
  window.addEventListener("DOMContentLoaded",aInit);
  </script>

    };

    const partnerNurture = (lead) => {
       const fname = lead.name.split(' ')[0];
       const s = PARTNER_SEGMENTS[lead.segment] || PARTNER_SEGMENTS.general;
       return `[TOUCH 1: THE PARTNERSHIP INTRODUCTION]\nSubject: Partnership opportunity — Ashley in Afrika x ${lead.company}\n\nDear ${fname},\n\nI lead Ashley in Afrika, a talent deployment brand connecting world-class African professionals with global companies across the US and UK.\n\nWe're building a Brand Partners program to align with organizations that share our mission of elevating African talent on the global stage. ${lead.company}'s leadership in the ${s.label.toLowerCase()} space makes this a natural fit.\n\nPartnership could include co-branded visibility, featured placement in our employer showcase, cross-promotional campaigns, and joint thought leadership.\n\nI'd welcome a conversation to explore alignment.\n\nWarm regards,\nAshley Cleveland\nFounder, Ashley in Afrika\n\n------------------------------------------------------\n[TOUCH 2: THE VALUE PROOF (5 Days Later)]\nSubject: Re: Partnership opportunity — Ashley in Afrika x ${lead.company}\n\nHi ${fname},\n\nFollowing up on my previous note. To give you a sense of our reach:\n\nWe work with scaling companies across the US, UK, and Europe, placing structured remote execution teams from across the African continent. Our community includes founders, operators, and decision-makers actively investing in African talent infrastructure.\n\nA partnership with ${lead.company} would put your brand directly in front of this audience.\n\nWould 15 minutes work to explore this further?\n\n------------------------------------------------------\n[TOUCH 3: THE SPECIFIC PROPOSAL (10 Days Later)]\nSubject: Quick idea for ${lead.company}\n\nHi ${fname},\n\nI had a specific idea I wanted to run by you:\n\nWhat if we featured ${lead.company} in our upcoming "African Excellence" spotlight series — a content campaign reaching our global founder network? We'd handle all production.\n\nNo cost, just visibility. Interested?\n\n------------------------------------------------------\n[TOUCH 4: THE GRACEFUL CLOSE (21 Days Later)]\nSubject: Closing the loop on partnership\n\nHi ${fname},\n\nI understand timing may not be right, so I'll leave this here.\n\nIf ${lead.company} ever explores brand partnerships that amplify African talent globally, we'd be honored to be part of that conversation.\n\nWishing you and the team continued success.\n\nWarmly,\nAshley Cleveland`;
    };

    /* ═══ MOCK LEAD GENERATORS ═══ */
    const generateMockClients = () => {
      const F=["Sarah","Marcus","David","Elena","James","Maya","John","Chris","Emma","Lucas","Olivia","Ethan"];
      const L=["Chen","Johnson","Patel","Smith","Rodriguez","Williams","Kim","Lee","Davis","Martinez"];
      const S=["Inc","Corp","Solutions","Technologies","Global","Group","Labs"];
      let m=[];const keys=Object.keys(CLIENT_SEGMENTS);
      keys.forEach(k=>{for(let i=0;i<200;i++){let f=F[Math.floor(Math.random()*F.length)],l=L[Math.floor(Math.random()*L.length)],t=CLIENT_SEGMENTS[k].titles[Math.floor(Math.random()*CLIENT_SEGMENTS[k].titles.length)],c=`${l} ${S[Math.floor(Math.random()*S.length)]}`;
      m.push({id:`${k}-${i}`,name:`${f} ${l}`,title:t,company:c,location:["United States","United Kingdom","Canada","Remote"][Math.floor(Math.random()*4)],website:`https://${c.toLowerCase().replace(/[^a-z0-9]/g,"")}.com`,email:"",segment:k,status:"New",linkedin:`https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(t+" at "+c)}`})}});

    };

    /* ═══ COPY BUTTON ═══ */
    function CopyBtn({text,label="Copy"}){
      const[c,setC]=useState(false);
      return <button onClick={()=>{navigator.clipboard.writeText(text);setC(true);setTimeout(()=>setC(false),2000)}} className="btn-secondary" style={{padding:"8px 16px",fontSize:13,background:c?"rgba(16,185,129,.2)":"transparent",color:c?"#10B981":"var(--text)",borderColor:c?"#10B981":"var(--border)"}}>{c?"✓ Copied":label}</button>;
    }

    /* ═══ OUTREACH PANEL ═══ */
    function OutreachPanel({lead,track,onClear}){
      const isPartner = track==="partners";
      const segs = isPartner ? PARTNER_SEGMENTS : CLIENT_SEGMENTS;
      const s = segs[lead.segment] || segs.general;
      const dm = isPartner ? partnerLinkedInDM(lead) : clientLinkedInDM(lead);
      const vn = isPartner ? partnerVoiceNote(lead) : clientVoiceNote(lead);
      const nurture = isPartner ? partnerNurture(lead) : clientNurture(lead);

      return (
        <div className="outreach-grid">
          <div>
            <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:24,position:"sticky",top:24}}>
              <div className="status-badge" style={{background:s.color+"15",color:s.color,display:"inline-block",marginBottom:16}}>{s.icon} {s.label}</div>
              <h2 style={{margin:"0 0 4px 0",fontSize:24}}>{lead.name}</h2>
              <div style={{color:"var(--muted)",fontSize:14}}>{lead.title}</div>
              <div style={{color:"var(--muted)",fontSize:14,marginBottom:4}}>{lead.company}</div>
              <div style={{color:"var(--muted)",fontSize:13,marginBottom:4}}>📍 {lead.location||"Global"}</div>
              {lead.website?<div style={{fontSize:13,marginBottom:24}}><a href={lead.website.startsWith('http')?lead.website:`https://${lead.website}`} target="_blank" rel="noreferrer" style={{color:"var(--accent)",textDecoration:"none",fontWeight:600}}>🌐 {lead.website.replace(/^https?:\/\//,'')}</a></div>:null}
              <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",color:"var(--muted)",marginBottom:8,letterSpacing:".05em"}}>{isPartner?"Partnership Angle":"Pain Point"}:</div>
              <div style={{fontSize:14,background:"var(--surface)",padding:12,borderRadius:8,border:"1px solid var(--border)",marginBottom:24,lineHeight:1.5}}>"{s.painPt}"</div>
              {lead.linkedin?<a href={lead.linkedin} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}><button className="btn-secondary" style={{width:"100%",marginBottom:12,padding:"12px",background:"rgba(10,102,194,.1)",color:"#0A66C2",borderColor:"rgba(10,102,194,.3)"}}>🔗 Search LinkedIn</button></a>:null}
              <button className="btn-secondary" style={{width:"100%"}} onClick={onClear}>Clear Selection</button>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:24}}>
            {/* LinkedIn DM */}
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden"}}>
              <div style={{background:"var(--card)",padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:800,color:"#0A66C2"}}>📩 LinkedIn Connect DM</div><CopyBtn text={dm}/></div>
              <div style={{padding:"16px 20px"}}><textarea readOnly value={dm} style={{width:"100%",height:180,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:16,fontSize:14,color:"var(--text)",fontFamily:"inherit",resize:"none",lineHeight:1.5}}/></div>
            </div>
            {/* Voice Note */}
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden"}}>
              <div style={{background:"var(--card)",padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:800,color:"#10B981"}}>🎙️ Voice Note Script</div><CopyBtn text={vn}/></div>
              <div style={{padding:"16px 20px"}}><textarea readOnly value={vn} style={{width:"100%",height:240,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:16,fontSize:14,color:"var(--text)",fontFamily:"inherit",resize:"none",lineHeight:1.5}}/></div>
            </div>
            {/* 4-Step Nurture */}
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden"}}>
              <div style={{background:"var(--card)",padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontWeight:800,color:"var(--accent)"}}>📧 4-Step Nurture Campaign</div><CopyBtn text={nurture} label="Copy Entire Sequence"/></div>
              <div style={{padding:"16px 20px"}}><textarea readOnly value={nurture} style={{width:"100%",height:500,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,padding:16,fontSize:14,color:"var(--text)",fontFamily:"inherit",resize:"none",lineHeight:1.6}}/></div>
            </div>
          </div>
        </div>
      );
    }

    /* ═══ LEAD TABLE ═══ */
    function LeadTable({leads,segments,onSelectLead,onUpdateStatus,currentPage,setCurrentPage}){
      const perPage=100;
      const start=(currentPage-1)*perPage;
      const page=leads.slice(start,start+perPage);
      const totalPages=Math.ceil(leads.length/perPage);
      return(
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <table className="desktop-table"><thead><tr style={{borderBottom:"1px solid var(--border)",backgroundColor:"var(--surface)",color:"var(--muted)",fontSize:12,textTransform:"uppercase"}}>
            <th style={{padding:"16px 24px",textAlign:"left"}}>Prospect</th><th style={{padding:"16px 24px",textAlign:"left"}}>Location</th><th style={{padding:"16px 24px",textAlign:"left"}}>Website</th><th style={{padding:"16px 24px",textAlign:"left"}}>Segment</th><th style={{padding:"16px 24px",textAlign:"left"}}>Status</th><th style={{padding:"16px 24px",textAlign:"right"}}>Actions</th>
          </tr></thead><tbody>
          {page.map((ld,i)=>{const seg=segments[ld.segment]||segments.general||{label:"Other",color:"#6366F1",icon:"📋"};return(
            <tr key={i} style={{borderBottom:"1px solid var(--border)",transition:"background .2s"}} onMouseEnter={e=>e.currentTarget.style.background="var(--surface)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <td style={{padding:"16px 24px"}}><div style={{fontWeight:700,fontSize:15}}>{ld.name}</div><div style={{color:"var(--muted)",fontSize:13,marginTop:4}}>{ld.title} @ <strong>{ld.company}</strong></div></td>
              <td style={{padding:"16px 24px"}}><div style={{color:"var(--text)",fontSize:14}}>📍 {ld.location||"Global"}</div></td>
              <td style={{padding:"16px 24px"}}>{ld.website?<a href={ld.website.startsWith('http')?ld.website:`https://${ld.website}`} target="_blank" rel="noreferrer" style={{color:"var(--accent)",textDecoration:"none",fontSize:13,fontWeight:600}}>🌐 {ld.website.replace(/^https?:\/\//,'').replace(/\/$/,'').substring(0,30)}</a>:null}</td>
              <td style={{padding:"16px 24px"}}><div className="status-badge" style={{background:seg.color+"15",color:seg.color}}>{seg.icon} {seg.label}</div></td>
              <td style={{padding:"16px 24px"}}><select value={ld.status} onChange={e=>onUpdateStatus(ld.id,e.target.value)} style={{padding:"6px 12px",background:ld.status==="New"?"var(--surface)":ld.status==="Contacted"?"rgba(16,185,129,.1)":"rgba(59,130,246,.1)",color:ld.status==="New"?"var(--muted)":ld.status==="Contacted"?"#10B981":"#3B82F6",border:"1px solid var(--border)",borderRadius:8,outline:"none",fontSize:12,fontWeight:700,cursor:"pointer"}}><option value="New">New</option><option value="Contacted">Contacted ✓</option><option value="In Progress">In Progress</option><option value="Converted">Converted 💰</option><option value="Rejected">Rejected</option></select></td>
              <td style={{padding:"16px 24px",textAlign:"right"}}><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                {ld.email?<a href={`mailto:${ld.email}`} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}><button className="btn-secondary" style={{padding:"8px 12px",background:"rgba(245,158,11,.1)",color:"#F59E0B",borderColor:"rgba(245,158,11,.3)",fontSize:12}}>📧</button></a>:null}
                {ld.linkedin?<a href={ld.linkedin} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}><button className="btn-secondary" style={{padding:"8px 12px",background:"rgba(10,102,194,.1)",color:"#0A66C2",borderColor:"rgba(10,102,194,.3)",fontSize:12}}>🔗</button></a>:null}
                <button className="btn-primary" style={{padding:"8px 16px",fontSize:12}} onClick={()=>onSelectLead(ld)}>Write Scripts</button>
              </div></td>
            </tr>)})}
          </tbody></table>
          <div className="mobile-cards">{page.map((ld,i)=>{const seg=segments[ld.segment]||segments.general||{label:"Other",color:"#6366F1",icon:"📋"};return(
            <div key={i} className="mobile-card">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div className="status-badge" style={{background:seg.color+"15",color:seg.color}}>{seg.icon} {seg.label}</div></div>
              <div style={{fontWeight:800,fontSize:18,marginBottom:4}}>{ld.name}</div>
              <div style={{color:"var(--muted)",fontSize:14,marginBottom:12}}>{ld.title} @ <strong>{ld.company}</strong></div>
              <button className="btn-primary" style={{width:"100%",padding:"12px",fontSize:13}} onClick={()=>{onSelectLead(ld);window.scrollTo(0,0)}}>Write Scripts</button>
            </div>)})}</div>
          <div className="pagination-bar">
            <div style={{color:"var(--muted)",fontSize:13}}>Showing <strong style={{color:"var(--text)"}}>{start+1}</strong> to <strong style={{color:"var(--text)"}}>{Math.min(start+perPage,leads.length)}</strong> of <strong style={{color:"var(--text)"}}>{leads.length.toLocaleString()}</strong></div>
            <div><button className="btn-secondary" style={{padding:"8px 16px"}} disabled={currentPage===1} onClick={()=>setCurrentPage(p=>p-1)}>Prev</button><span style={{fontSize:13,color:"var(--text)",fontWeight:700,padding:"0 12px"}}>{currentPage}/{totalPages||1}</span><button className="btn-secondary" style={{padding:"8px 16px"}} disabled={currentPage>=totalPages} onClick={()=>setCurrentPage(p=>p+1)}>Next</button></div>
          </div>
        </div>
      );
    }

    /* ═══ MAIN APP ═══ */
    function App() {
      const [view,setView]=useState("clients");
      const [clientLeads,setClientLeads]=useState([]);
      const [partnerLeads,setPartnerLeads]=useState([]);
      const [filteredClients,setFilteredClients]=useState([]);
      const [filteredPartners,setFilteredPartners]=useState([]);
      const [filterSeg,setFilterSeg]=useState("all");
      const [activeLead,setActiveLead]=useState(null);
      const [activeTrack,setActiveTrack]=useState("clients");
      const [clientPage,setClientPage]=useState(1);
      const [partnerPage,setPartnerPage]=useState(1);
      const [loading,setLoading]=useState(true);

      const detectClientSegment=(industry)=>{const i=(industry||"").toLowerCase();if(i.includes("saas")||i.includes("cloud")||i.includes("ai")||i.includes("dev")||i.includes("cyber")||i.includes("security"))return"saas";if(i.includes("ecom")||i.includes("commerce"))return"ecom";if(i.includes("health")||i.includes("medical"))return"healthcare";if(i.includes("fintech")||i.includes("finance"))return"fintech";if(i.includes("agency")||i.includes("marketing"))return"agency";if(i.includes("hr")||i.includes("people"))return"hrtech";if(i.includes("real estate")||i.includes("proptech"))return"realestate";if(i.includes("logistics")||i.includes("supply"))return"logistics";if(i.includes("consult"))return"consulting";if(i.includes("edtech")||i.includes("education"))return"edtech";if(i.includes("b2b")||i.includes("service"))return"b2b";return"general"};
      const detectPartnerSegment=(category)=>{const c=(category||"").toLowerCase();if(c.includes("bank")||c.includes("financ"))return"bank";if(c.includes("airline")||c.includes("aviation"))return"airline";if(c.includes("hotel")||c.includes("hospitality"))return"hotel";if(c.includes("construct")||c.includes("real estate"))return"construction";if(c.includes("tourism")||c.includes("govt")||c.includes("investment")||c.includes("ministry"))return"tourism";return"general"};

      const parseCSV=(file,isPartner,cb)=>{Papa.parse(file,{header:true,skipEmptyLines:true,complete:function(r){const leads=[];r.data.forEach((row,i)=>{let name=row.Name||row["First Name"]?`${row["First Name"]||""} ${row["Last Name"]||""}`.trim():row.name;if(!name)name="Unknown";const title=row.Title||row.title||row["Job Title"]||"";const company=row.Company||row.company||row["Company Name"]||row.Organization||"";const location=row.Location||row.location||row["Company Location"]||row.Country||"Global";const website=row.Website||row.website||row["Company URL"]||row["Company Url"]||"";const linkedin=row.LinkedIn||row["LinkedIn Url"]||row["LinkedIn URL"]||row["Person Linkedin Url"]||row.linkedin||"";const email=row.Email||row.email||row["Person Email"]||"";const industry=row.Industry||row.industry||row.Category||row.category||"";const segment=isPartner?detectPartnerSegment(industry||row.Category||""):detectClientSegment(industry);leads.push({id:`csv-${Date.now()}-${i}`,name,title,company,location,website,linkedin,email,segment,status:row.Status||"New"})});cb(leads)}})};

      const handleUpload=(e,isPartner)=>{const file=e.target.files[0];if(!file)return;parseCSV(file,isPartner,(leads)=>{if(isPartner){setPartnerLeads(prev=>{const map=new Map();prev.forEach(l=>map.set(l.name.toLowerCase()+"-"+l.company.toLowerCase(),l));leads.forEach(l=>{const k=l.name.toLowerCase()+"-"+l.company.toLowerCase();if(!map.has(k))map.set(k,l)});return Array.from(map.values())});setFilterSeg("all")}else{setClientLeads(prev=>{const base=prev.some(l=>!l.id.startsWith('csv-'))?[]:prev;const map=new Map();base.forEach(l=>map.set(l.name.toLowerCase()+"-"+l.company.toLowerCase(),l));leads.forEach(l=>{const k=l.name.toLowerCase()+"-"+l.company.toLowerCase();if(!map.has(k))map.set(k,l)});return Array.from(map.values())});setFilterSeg("all")}})};

      const downloadCSV=(leads,filename)=>{const h=["Name","Title","Company","Location","Email","LinkedIn","Website","Segment","Status"];const rows=leads.map(l=>[l.name,l.title,l.company,l.location,l.email,l.linkedin,l.website,l.segment,l.status].map(v=>`"${(v||"").replace(/"/g,'""')}"`).join(","));const csv=[h.join(","),...rows].join("\n");const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click()};

      const updateStatus=(leads,setLeads,id,status)=>{setLeads(prev=>prev.map(l=>l.id===id?{...l,status}:l))};

      useEffect(()=>{fetch('aia_target_leads.csv').then(r=>{if(!r.ok)throw new Error();return r.text()}).then(t=>{const file=new File([t],"leads.csv",{type:"text/csv"});parseCSV(file,false,(leads)=>{setClientLeads(leads);setLoading(false)})}).catch(()=>{setClientLeads(generateMockClients());setLoading(false)});},[]);

      useEffect(()=>{const segs=view==="clients"?CLIENT_SEGMENTS:PARTNER_SEGMENTS;const leads=view==="clients"?clientLeads:partnerLeads;if(filterSeg==="all")view==="clients"?setFilteredClients(leads):setFilteredPartners(leads);else view==="clients"?setFilteredClients(leads.filter(l=>l.segment===filterSeg)):setFilteredPartners(leads.filter(l=>l.segment===filterSeg))},[filterSeg,clientLeads,partnerLeads,view]);

      useEffect(()=>{setFilterSeg("all");setActiveLead(null)},[view]);

      if(loading)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:16}}>🚀</div><h2 style={{margin:"0 0 8px"}}>Initializing Pipeline</h2><p style={{color:"var(--muted)"}}>Loading leads...</p></div></div>;

      const currentLeads=view==="clients"?filteredClients:filteredPartners;
      const currentSegs=view==="clients"?CLIENT_SEGMENTS:PARTNER_SEGMENTS;
      const isOutreach=view==="client-outreach"||view==="partner-outreach";

      return(
        <div className="app-container">
          <div className="sidebar">
            <div className="sidebar-header">
              <div style={{background:view.includes("partner")?"var(--gradient2)":"var(--gradient)",width:40,height:40,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,marginBottom:16}}>A</div>
              <div style={{fontSize:18,fontWeight:800}}>Ashley in Afrika</div>
              <div style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".1em"}}>Outreach Command Center v3</div>
            </div>
            <div className="sidebar-nav">
              <div className="nav-item" onClick={()=>setView("clients")} style={{background:view==="clients"?"var(--card)":"transparent",color:view==="clients"?"var(--text)":"var(--muted)",fontWeight:view==="clients"?700:500}}>
                <span style={{fontSize:18}}>📁</span> BrandUp Clients <span style={{marginLeft:"auto",fontSize:11,background:"var(--border)",padding:"2px 8px",borderRadius:100}}>{clientLeads.length}</span>
              </div>
              <div className="nav-item" onClick={()=>setView("client-outreach")} style={{background:view==="client-outreach"?"var(--card)":"transparent",color:view==="client-outreach"?"var(--text)":"var(--muted)",fontWeight:view==="client-outreach"?700:500}}>
                <span style={{fontSize:18}}>⚡</span> Client Outreach
              </div>
              <div className="nav-divider"/>
              <div className="nav-item" onClick={()=>setView("partners")} style={{background:view==="partners"?"var(--card)":"transparent",color:view==="partners"?"var(--text)":"var(--muted)",fontWeight:view==="partners"?700:500}}>
                <span style={{fontSize:18}}>🌍</span> Brand Partners <span style={{marginLeft:"auto",fontSize:11,background:"var(--border)",padding:"2px 8px",borderRadius:100}}>{partnerLeads.length}</span>
              </div>
              <div className="nav-item" onClick={()=>setView("partner-outreach")} style={{background:view==="partner-outreach"?"var(--card)":"transparent",color:view==="partner-outreach"?"var(--text)":"var(--muted)",fontWeight:view==="partner-outreach"?700:500}}>
                <span style={{fontSize:18}}>🤝</span> Partner Outreach
              </div>
            </div>
          </div>

          <div className="content-area">
            {/* ═══ CLIENT DATABASE ═══ */}
            {view==="clients"&&(
              <div className="animate-up">
                <div className="page-header">
                  <div><h1 style={{fontSize:36,margin:"0 0 8px"}}>Dream List — BrandUp Clients</h1><p style={{color:"var(--muted)",margin:0,fontSize:16}}>ICP targets for Ashley's remote talent offer</p></div>
                  <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                    <label className="btn-secondary" style={{padding:"12px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,borderColor:"var(--accent)",color:"var(--accent)"}}><input type="file" accept=".csv" style={{display:"none"}} onChange={e=>handleUpload(e,false)}/><span>📥 Upload CSV</span></label>
                    <button onClick={()=>downloadCSV(filteredClients,`aia_clients_${new Date().toISOString().slice(0,10)}.csv`)} className="btn-secondary" style={{padding:"12px 20px",borderColor:"#10B981",color:"#10B981"}}>📤 Download</button>
                    <select value={filterSeg} onChange={e=>{setFilterSeg(e.target.value);setClientPage(1)}} style={{padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,color:"var(--text)",outline:"none",fontSize:14}}><option value="all">All ({clientLeads.length})</option>{Object.entries(CLIENT_SEGMENTS).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}</select>
                  </div>
                </div>
                <LeadTable leads={filteredClients} segments={CLIENT_SEGMENTS} onSelectLead={ld=>{setActiveLead(ld);setActiveTrack("clients");setView("client-outreach")}} onUpdateStatus={(id,st)=>updateStatus(clientLeads,setClientLeads,id,st)} currentPage={clientPage} setCurrentPage={setClientPage}/>
              </div>
            )}

            {/* ═══ PARTNER DATABASE ═══ */}
            {view==="partners"&&(
              <div className="animate-up">
                <div className="page-header">
                  <div><h1 style={{fontSize:36,margin:"0 0 8px"}}>Brand Partners — Ashley in Afrika</h1><p style={{color:"var(--muted)",margin:0,fontSize:16}}>African banks, hotels, airlines, construction, tourism & govt agencies</p></div>
                  <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
                    <label className="btn-secondary" style={{padding:"12px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:8,borderColor:"#F59E0B",color:"#F59E0B"}}><input type="file" accept=".csv" style={{display:"none"}} onChange={e=>handleUpload(e,true)}/><span>📥 Upload Partners CSV</span></label>
                    <button onClick={()=>downloadCSV(filteredPartners,`aia_partners_${new Date().toISOString().slice(0,10)}.csv`)} className="btn-secondary" style={{padding:"12px 20px",borderColor:"#10B981",color:"#10B981"}}>📤 Download</button>
                    <select value={filterSeg} onChange={e=>{setFilterSeg(e.target.value);setPartnerPage(1)}} style={{padding:"12px 16px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:12,color:"var(--text)",outline:"none",fontSize:14}}><option value="all">All ({partnerLeads.length})</option>{Object.entries(PARTNER_SEGMENTS).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}</select>
                  </div>
                </div>
                {partnerLeads.length===0?(
                  <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed var(--border)",borderRadius:16,color:"var(--muted)",background:"var(--card)"}}><div style={{fontSize:48,marginBottom:16}}>🌍</div><h3 style={{margin:"0 0 8px"}}>No Brand Partners Loaded</h3><p style={{margin:0,maxWidth:400,marginLeft:"auto",marginRight:"auto"}}>Upload a CSV with your Brand Partners Dream 100 list (African banks, hotels, airlines, construction, tourism ministries).</p></div>
                ):(<LeadTable leads={filteredPartners} segments={PARTNER_SEGMENTS} onSelectLead={ld=>{setActiveLead(ld);setActiveTrack("partners");setView("partner-outreach")}} onUpdateStatus={(id,st)=>updateStatus(partnerLeads,setPartnerLeads,id,st)} currentPage={partnerPage} setCurrentPage={setPartnerPage}/>)}
              </div>
            )}

            {/* ═══ CLIENT OUTREACH ═══ */}
            {view==="client-outreach"&&(
              <div className="animate-up">
                <h1 style={{fontSize:32,margin:"0 0 8px"}}>Client Outreach Engine</h1>
                <p style={{color:"var(--muted)",margin:"0 0 32px",fontSize:16}}>LinkedIn DM + Voice Note + 4-Step Nurture for BrandUp clients</p>
                {activeLead&&activeTrack==="clients"?<OutreachPanel lead={activeLead} track="clients" onClear={()=>setActiveLead(null)}/>:(
                  <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed var(--border)",borderRadius:16,color:"var(--muted)",background:"var(--card)"}}><div style={{fontSize:48,marginBottom:16}}>🎯</div><h3 style={{margin:"0 0 8px"}}>No Client Selected</h3><p style={{margin:0,maxWidth:400,marginLeft:"auto",marginRight:"auto"}}>Go to BrandUp Clients and click "Write Scripts" on any lead.</p><button className="btn-primary" style={{marginTop:24,padding:"12px 24px"}} onClick={()=>setView("clients")}>Browse Clients</button></div>
                )}
              </div>
            )}

            {/* ═══ PARTNER OUTREACH ═══ */}
            {view==="partner-outreach"&&(
              <div className="animate-up">
                <h1 style={{fontSize:32,margin:"0 0 8px"}}>Partner Outreach Engine</h1>
                <p style={{color:"var(--muted)",margin:"0 0 32px",fontSize:16}}>LinkedIn DM + Voice Note + 4-Step Partnership Nurture</p>
                {activeLead&&activeTrack==="partners"?<OutreachPanel lead={activeLead} track="partners" onClear={()=>setActiveLead(null)}/>:(
                  <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed var(--border)",borderRadius:16,color:"var(--muted)",background:"var(--card)"}}><div style={{fontSize:48,marginBottom:16}}>🌍</div><h3 style={{margin:"0 0 8px"}}>No Partner Selected</h3><p style={{margin:0,maxWidth:400,marginLeft:"auto",marginRight:"auto"}}>Go to Brand Partners and click "Write Scripts" on any partner.</p><button className="btn-primary" style={{marginTop:24,padding:"12px 24px"}} onClick={()=>setView("partners")}>Browse Partners</button></div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
