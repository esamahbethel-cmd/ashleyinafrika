<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ashley in Afrika | Operating System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="aia_clients_data.js"></script>
  <script src="aia_partners_data.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0A0A0F;--surface:#111118;--card:#16161F;--border:#1E1E2E;
      --text:#F0F0FF;--muted:#6B6B8A;--accent:#7C3AED;--accent2:#06B6D4;
      --green:#10B981;--amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;--pink:#EC4899;
      --gradient:linear-gradient(135deg,#7C3AED,#06B6D4);
      --gradient2:linear-gradient(135deg,#EC4899,#7C3AED);
      --gradient3:linear-gradient(135deg,#10B981,#06B6D4);
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
    .sidebar-brand{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
    .brand-logo{width:36px;height:36px;border-radius:10px;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;margin-bottom:10px}
    .brand-name{font-size:14px;font-weight:800;font-family:'Outfit',sans-serif}
    .brand-sub{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
    .nav-section{padding:12px 8px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;margin:1px 8px}
    .nav-item:hover{background:var(--card);color:var(--text)}
    .nav-item.active{background:var(--card);color:var(--text);font-weight:700}
    .nav-badge{margin-left:auto;font-size:10px;background:var(--border);padding:2px 7px;border-radius:100px;font-weight:700}
    .nav-badge.hot{background:rgba(239,68,68,.2);color:var(--red)}
    .content{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 32px}
    .page-title{font-size:28px;font-weight:800;font-family:'Outfit',sans-serif;margin-bottom:4px}
    .page-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
    .card-sm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .stat-card.green::before{background:var(--green)}
    .stat-card.blue::before{background:var(--blue)}
    .stat-card.amber::before{background:var(--amber)}
    .stat-card.purple::before{background:var(--accent)}
    .stat-card.red::before{background:var(--red)}
    .stat-card.cyan::before{background:var(--accent2)}
    .stat-card.pink::before{background:var(--pink)}
    .stat-val{font-size:32px;font-weight:800;font-family:'Outfit',sans-serif;line-height:1}
    .stat-label{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
    .stat-sub{font-size:11px;color:var(--muted);margin-top:8px}
    .btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid;transition:all .15s;font-family:'DM Sans',sans-serif}
    .btn-primary{background:var(--gradient);color:#fff;border-color:transparent}
    .btn-secondary{background:transparent;color:var(--text);border-color:var(--border)}
    .btn-secondary:hover{background:var(--surface);border-color:var(--muted)}
    .btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
    .tag{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .input{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;width:100%}
    .input:focus{border-color:var(--accent)}
    .select{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
    .table{width:100%;border-collapse:collapse;table-layout:fixed}
    .table th{padding:10px 12px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
    .table td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
    .table tr:last-child td{border-bottom:none}
    .table tr:hover td{background:var(--surface)}
    .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
    .overdue{background:rgba(239,68,68,.06);border-left:3px solid var(--red)}
    .score-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;width:60px;display:inline-block}
    .score-fill{height:100%;border-radius:2px;background:var(--gradient)}
    .auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
    .auth-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px;width:360px;text-align:center}
    .logout-btn{position:fixed;top:12px;right:12px;z-index:100;padding:6px 14px;font-size:12px;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:8px;cursor:pointer;font-weight:700}
    @media(max-width:900px){
      .sidebar{width:180px;min-width:180px}
      .content{padding:16px}
      .grid-4{grid-template-columns:repeat(2,1fr)}
      .grid-3{grid-template-columns:1fr 1fr}
    }
    @media(max-width:640px){
      .sidebar{display:none}
      .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback}=React;

/* ═══════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════ */
const AUTH_USERS=[
  {name:"Bethel Esamah",pin:"AIA2026BE",role:"admin"},
  {name:"Ashley Cleveland",pin:"AIA2026AC",role:"admin"},
  {name:"Gwen L. Miñoza",pin:"AIA2026GM",role:"team"},
  {name:"Nailah Best",pin:"AIA2026NB",role:"team"},
];

const PIPELINE_STAGES={
  not_contacted:{label:"Not Contacted",color:"#6B6B8A",icon:"○",score:0},
  connection_sent:{label:"Connection Sent",color:"#3B82F6",icon:"→",score:0},
  connected:{label:"Connected",color:"#06B6D4",icon:"✓",score:1},
  message_sent:{label:"Message Sent",color:"#8B5CF6",icon:"✉",score:1},
  replied:{label:"Replied",color:"#10B981",icon:"↩",score:2},
  voice_note_sent:{label:"Voice Note Sent",color:"#F59E0B",icon:"🎙",score:2},
  call_booked:{label:"Call Booked",color:"#EC4899",icon:"📅",score:5},
  closed:{label:"Closed Won",color:"#10B981",icon:"💰",score:10},
  not_interested:{label:"Not Interested",color:"#EF4444",icon:"✕",score:0},
};

const PARTNER_STAGES={
  identified:{label:"Identified",color:"#6B6B8A",icon:"○"},
  researched:{label:"Researched",color:"#3B82F6",icon:"🔍"},
  outreach_sent:{label:"Outreach Sent",color:"#8B5CF6",icon:"→"},
  responded:{label:"Responded",color:"#10B981",icon:"↩"},
  conversation_active:{label:"Conversation Active",color:"#F59E0B",icon:"💬"},
  partnership_confirmed:{label:"Partnership Confirmed",color:"#EC4899",icon:"🤝"},
};

const SIZE_TIERS={
  startup:{label:"Startup (<$1M)",color:"#10B981",icon:"🌱"},
  growth:{label:"Growth ($1M-$10M)",color:"#F59E0B",icon:"🚀"},
  scale:{label:"Scale ($10M+)",color:"#8B5CF6",icon:"🏢"},
};

const CLIENT_SEGMENTS={
  saas:{label:"SaaS & Cloud",color:"#10B981",icon:"☁️"},
  fintech:{label:"FinTech",color:"#3B82F6",icon:"💳"},
  ecom:{label:"E-Commerce",color:"#F59E0B",icon:"🛍️"},
  healthcare:{label:"Healthcare",color:"#8B5CF6",icon:"⚕️"},
  agency:{label:"Marketing Agency",color:"#EC4899",icon:"🎨"},
  realestate:{label:"Real Estate",color:"#EF4444",icon:"🏢"},
  consulting:{label:"Consulting",color:"#06B6D4",icon:"📈"},
  general:{label:"High-Growth Founders",color:"#10B981",icon:"🌟"},
};

const PARTNER_SEGMENTS={
  fintech:{label:"Fintech & Banking",color:"#059669",icon:"🏦"},
  travel:{label:"Travel & Relocation",color:"#2563EB",icon:"✈️"},
  fashion:{label:"African Fashion & Lifestyle",color:"#EC4899",icon:"👗"},
  realestate:{label:"Real Estate & Property",color:"#EF4444",icon:"🏠"},
  business:{label:"Business & Investment",color:"#F59E0B",icon:"📈"},
  legal:{label:"Legal & Professional Services",color:"#8B5CF6",icon:"⚖️"},
  diaspora:{label:"Diaspora Community",color:"#0891B2",icon:"🌍"},
  general:{label:"Other Partners",color:"#6366F1",icon:"🤝"},
};

const FOLLOW_UP_DAYS=[1,3,7,14,21];

/* ═══════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════ */
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
const load=(k)=>{try{const d=localStorage.getItem(k);return d?JSON.parse(d):null}catch(e){return null}};

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
const calcScore=(lead)=>{
  const stageScore=PIPELINE_STAGES[lead.pipeline||"not_contacted"]?.score||0;
  const extraScore=(lead.linkClicked?3:0);
  return stageScore+extraScore;
};
const daysSince=(dateStr)=>{
  if(!dateStr)return null;
  const d=new Date(dateStr);const now=new Date();
  return Math.floor((now-d)/(1000*60*60*24));
};
const nextFollowUp=(lead)=>{
  if(!lead.seqStartDate)return null;
  const d=daysSince(lead.seqStartDate);
  if(d===null)return null;
  const next=FOLLOW_UP_DAYS.find(day=>day>d);
  return next||null;
};
const isOverdue=(lead)=>{
  if(!lead.seqStartDate)return false;
  const d=daysSince(lead.seqStartDate);
  const next=nextFollowUp(lead);
  if(!next)return false;
  return d>=next;
};

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
function AuthGate({onAuth}){
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[attempts,setAttempts]=useState(0);
  const[locked,setLocked]=useState(false);
  const submit=()=>{
    if(locked)return;
    const u=AUTH_USERS.find(u=>u.pin===pin.trim().toUpperCase());
    if(u){onAuth(u)}
    else{
      const a=attempts+1;setAttempts(a);setErr(`Invalid code. ${5-a} attempts remaining.`);setPin("");
      if(a>=5){setLocked(true);setErr("Account locked for 15 minutes.")}
    }
  };
  return(
    <div className="auth-overlay">
      <div className="auth-card">
        <div style={{fontSize:40,marginBottom:16}}>🔒</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>AIA Operating System</div>
        <div style={{color:"var(--muted)",fontSize:13,marginBottom:24}}>Authorized Access Only</div>
        <input className="input" type="password" placeholder="Access Code" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} style={{marginBottom:12,textAlign:"center",letterSpacing:"0.2em"}}/>
        {err&&<div style={{color:"var(--red)",fontSize:12,marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary" onClick={submit} style={{width:"100%",padding:"12px"}}>Authenticate</button>
        <div style={{fontSize:10,color:"var(--muted)",marginTop:16}}>WORKSTREAM AI · SECURED ACCESS</div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   PIPELINE STATUS SELECT
═══════════════════════════════════════════ */
function PipelineSelect({value,onChange}){
  const s=PIPELINE_STAGES[value||"not_contacted"];
  return(
    <select value={value||"not_contacted"} onChange={e=>onChange(e.target.value)}
      style={{padding:"4px 8px",background:`${s.color}18`,color:s.color,border:`1px solid ${s.color}40`,borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",outline:"none"}}>
      {Object.entries(PIPELINE_STAGES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
    </select>
  );
}

/* ═══════════════════════════════════════════
   EDIT FIELD
═══════════════════════════════════════════ */
function EditField({value,placeholder,onSave,type="text"}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(value||"");
  useEffect(()=>{setVal(value||"")},[value]);
  if(editing)return <input autoFocus value={val} onChange={e=>setVal(e.target.value)} onBlur={()=>{setEditing(false);onSave(val)}} onKeyDown={e=>{if(e.key==="Enter"){setEditing(false);onSave(val)}if(e.key==="Escape"){setEditing(false);setVal(value||"")}}} placeholder={placeholder} style={{padding:"3px 6px",background:"var(--bg)",border:"1px solid var(--accent)",borderRadius:5,color:"var(--text)",fontSize:11,width:"100%",outline:"none",fontFamily:"inherit"}}/>;
  if(!val)return <span onClick={()=>setEditing(true)} style={{cursor:"pointer",color:"var(--muted)",fontSize:11,borderBottom:"1px dashed var(--border)"}}>+ {placeholder}</span>;
  const href=type==="email"?`mailto:${val}`:val.startsWith("http")?val:`https://${val}`;
  const icon=type==="email"?"📧":val.includes("linkedin")?"🔗":"🌐";
  const display=val.replace(/^https?:\/\/(www\.)?/,"").replace(/\/$/,"").substring(0,24);
  return <span style={{display:"flex",alignItems:"center",gap:3}}>
    <a href={href} target="_blank" rel="noreferrer" style={{color:type==="email"?"var(--amber)":val.includes("linkedin")?"#0A66C2":"var(--accent2)",textDecoration:"none",fontSize:11,fontWeight:600}} onClick={e=>e.stopPropagation()}>{icon} {display}</a>
    <button onClick={e=>{e.stopPropagation();setEditing(true)}} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:9,padding:"1px 3px",opacity:.5}}>✎</button>
  </span>;
}

/* ═══════════════════════════════════════════
   COPY BUTTON
═══════════════════════════════════════════ */
function CopyBtn({text,label="Copy"}){
  const[c,setC]=useState(false);
  return <button onClick={()=>{navigator.clipboard.writeText(text);setC(true);setTimeout(()=>setC(false),2000)}} className="btn btn-secondary btn-sm" style={{background:c?"rgba(16,185,129,.2)":"transparent",color:c?"var(--green)":"var(--text)",borderColor:c?"var(--green)":"var(--border)"}}>{c?"✓ Copied":label}</button>;
}

/* ═══════════════════════════════════════════
   OUTREACH PANEL
═══════════════════════════════════════════ */
function OutreachPanel({lead,onClose}){
  const s=CLIENT_SEGMENTS[lead.segment]||CLIENT_SEGMENTS.general;
  const sz=lead.size||"sme";
  const fname=lead.name?lead.name.split(" ")[0]:"there";
  const ind=s.label.split(" /")[0].toLowerCase();

  const dm=sz==="scale"?
    `Hi ${fname},\n\nNoticed ${lead.company} is scaling fast — at that stage, the ops side almost never keeps pace with growth. Support backlogs, admin chaos, and execution gaps start costing real revenue.\n\nWe build "Done-For-You" remote execution teams for founders like you — pre-trained, plug-in-ready, and a fraction of local hiring costs. Your team grows without the overhead.\n\nOpen to a 15-minute call to see how we'd structure a pod for ${lead.company}?`:
    sz==="growth"?
    `Hey ${fname},\n\nScaling a ${ind} company past the $1M mark usually means the founder ends up doing everything — and the ops side becomes the bottleneck that slows the whole machine.\n\nWe drop in pre-trained remote execution teams — support, admin, data, ops — so you can buy back your time without the cost of local hiring.\n\nWorth a quick 10-min chat to see what a pod looks like for ${lead.company}?`:
    `Hey ${fname},\n\nAs a ${lead.title} at ${lead.company}, I imagine you're wearing a lot of hats right now — and the operational side is probably costing you more time than it should.\n\nWe help founders like you deploy a remote execution pod — pre-trained team members who handle the admin, support, and ops work — so you can focus on growth.\n\nOpen to a quick call?`;

  const vn=sz==="scale"?
    `[VOICE NOTE — Peer founder tone]\n\n"Hi ${fname}, it's Ashley from Ashley in Afrika.\n\nI came across ${lead.company} and I can see you've built something impressive — and at that scale, the ops and execution side is usually where founders start feeling the most friction.\n\nWe build pre-trained remote execution pods — your team gets dedicated support, admin, and ops professionals who plug in fast and cost a fraction of local hiring.\n\nRecently helped a scaling ${ind} company clear a massive backlog in 30 days. Would love to show you how we'd structure something for ${lead.company}. 15 minutes this week?"\n\n[TIPS: Under 60 seconds. Energy and warmth. Lead with a compliment on what they built. End with specific ask.]`:
    sz==="growth"?
    `[VOICE NOTE — Friendly, direct]\n\n"Hey ${fname}, Ashley from Ashley in Afrika.\n\nI came across ${lead.company} — really impressive what you're building in the ${ind} space.\n\nI work with founders at your stage who are scaling fast but finding that the ops side doesn't scale with them. We drop in pre-trained remote execution teams — support, admin, and data — so the founder can actually focus on what moves the needle.\n\nWould love to chat for 10 minutes and see if this fits. Let me know!"\n\n[TIPS: Under 60 seconds. Genuine, excited tone. Reference their industry. Soft 10-min ask.]`:
    `[VOICE NOTE — Warm, relatable]\n\n"Hey ${fname}, it's Ashley from Ashley in Afrika.\n\nI know the early-stage founder grind — you're doing everything yourself and there's never enough time. We help founders like you get pre-trained remote team members who handle the execution work — admin, support, ops — so you can buy back your time.\n\nOne founder I worked with went from drowning in emails to having a full support function in 2 weeks. Would love to show you how. Open to a quick 10-minute call?"\n\n[TIPS: Under 60 seconds. Relatable and warm. Tell a short story. End with specific ask.]`;

  const nurture=`[TOUCH 1 — Day 1]\nSubject: Question about ops at ${lead.company}?\n\nHi ${fname},\n\nUsually when I speak with ${lead.title}s scaling a ${ind} company, their biggest bottleneck is execution capacity — the ops, admin, and support work that piles up faster than the team can handle it.\n\nAt Ashley in Afrika, we solve this by dropping in a pre-trained, 3-person remote execution pod for less than the cost of one local US hire.\n\nWould you be open to a 10-minute chat this week to see what an ops structure looks like for ${lead.company}?\n\nBest,\nAshley Cleveland\nAshley in Afrika\n\n------\n[TOUCH 2 — Day 3]\nSubject: Re: ops at ${lead.company}\n\nHey ${fname},\n\nQuick follow-up. We recently helped a ${ind} founder who was spending 30+ hours/week on support, admin, and execution work.\n\nBEFORE: Founder doing everything, team overwhelmed, growth stalling.\nAFTER: Remote execution pod deployed in 2 weeks. Founder freed up 25 hours/week. Company scaled 3 new clients in 30 days.\n\nIs this the kind of challenge you're dealing with at ${lead.company}?\n\n------\n[TOUCH 3 — Day 7]\nSubject: A quick resource for ${lead.company}\n\nHi ${fname},\n\nI put together an Ops Bottleneck Audit specifically for ${ind} founders — shows exactly where execution gaps are costing you time and revenue.\n\nWant me to send it? No call required.\n\nAshley Cleveland\n\n------\n[TOUCH 4 — Day 14]\nSubject: Last note from me\n\nHey ${fname}, timing might not be right — totally fine.\n\nIf ${lead.company} ever needs an execution team that deploys fast and costs less than local hiring, we'd be a strong fit.\n\nKeep us in mind.\n\nAshley Cleveland, Ashley in Afrika`;

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"flex-end",zIndex:200}}>
      <div style={{background:"var(--card)",width:"520px",height:"100%",overflow:"auto",padding:"24px",borderLeft:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <div style={{fontWeight:800,fontSize:18}}>{lead.name||"Lead"}</div>
            <div style={{color:"var(--muted)",fontSize:13}}>{lead.title} @ <strong style={{color:"var(--text)"}}>{lead.company}</strong></div>
          </div>
          <button onClick={onClose} style={{background:"var(--border)",border:"none",borderRadius:8,padding:"6px 12px",color:"var(--text)",cursor:"pointer",fontWeight:700,fontSize:13}}>✕ Close</button>
        </div>
        {lead.website&&<div style={{marginBottom:6}}><a href={lead.website} target="_blank" rel="noreferrer" style={{color:"var(--accent2)",fontSize:13,fontWeight:600,textDecoration:"none"}}>🌐 {lead.website.replace(/^https?:\/\/(www\.)?/,"").substring(0,40)}</a></div>}
        {lead.linkedin&&<div style={{marginBottom:6}}><a href={lead.linkedin} target="_blank" rel="noreferrer" style={{color:"#0A66C2",fontSize:13,fontWeight:600,textDecoration:"none"}}>🔗 {lead.linkedin.replace(/^https?:\/\/(www\.)?/,"").substring(0,40)}</a></div>}
        {lead.email&&<div style={{marginBottom:20}}><a href={`mailto:${lead.email}`} style={{color:"var(--amber)",fontSize:13,fontWeight:600,textDecoration:"none"}}>📧 {lead.email}</a></div>}
        <hr className="divider"/>
        {[["LinkedIn DM",dm],["Voice Note Script",vn],["4-Step Nurture Sequence",nurture]].map(([title,text])=>(
          <div key={title} style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontWeight:700,fontSize:14}}>{title}</div>
              <CopyBtn text={text} label="Copy Script"/>
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"var(--muted)",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:180,overflowY:"auto"}}>{text}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   METRICS DASHBOARD
═══════════════════════════════════════════ */
function Dashboard({leads,partners}){
  const stats=useMemo(()=>{
    const total=leads.length;
    const byStage=(stage)=>leads.filter(l=>(l.pipeline||"not_contacted")===stage).length;
    const connSent=byStage("connection_sent")+byStage("connected")+byStage("message_sent")+byStage("replied")+byStage("voice_note_sent")+byStage("call_booked")+byStage("closed");
    const connAccepted=byStage("connected")+byStage("message_sent")+byStage("replied")+byStage("voice_note_sent")+byStage("call_booked")+byStage("closed");
    const msgSent=byStage("message_sent")+byStage("replied")+byStage("voice_note_sent")+byStage("call_booked")+byStage("closed");
    const replied=byStage("replied")+byStage("voice_note_sent")+byStage("call_booked")+byStage("closed");
    const vnSent=byStage("voice_note_sent")+byStage("call_booked")+byStage("closed");
    const callBooked=byStage("call_booked")+byStage("closed");
    const closed=byStage("closed");
    const overdue=leads.filter(l=>isOverdue(l)&&(l.pipeline||"not_contacted")!=="closed"&&(l.pipeline||"not_contacted")!=="not_interested").length;
    const partnerConfirmed=partners.filter(p=>p.partnerStage==="partnership_confirmed").length;
    const connRate=connSent>0?Math.round(connAccepted/connSent*100):0;
    const replyRate=msgSent>0?Math.round(replied/msgSent*100):0;
    const bookRate=replied>0?Math.round(callBooked/replied*100):0;
    const rev=closed*12000;
    return{total,connSent,connAccepted,msgSent,replied,vnSent,callBooked,closed,overdue,partnerConfirmed,connRate,replyRate,bookRate,rev};
  },[leads,partners]);

  const MetricCard=({label,val,sub,cls,icon})=>(
    <div className={`stat-card ${cls}`}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div className="stat-val">{typeof val==="number"&&val>999?`${(val/1000).toFixed(1)}K`:val}</div>
          <div className="stat-label">{label}</div>
          {sub&&<div className="stat-sub">{sub}</div>}
        </div>
        <div style={{fontSize:24}}>{icon}</div>
      </div>
    </div>
  );

  return(
    <div>
      <div className="page-title">📊 Metrics Dashboard</div>
      <div className="page-sub">Auto-calculated from pipeline. Updates in real time.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        <MetricCard label="Total Pipeline" val={stats.total} cls="blue" icon="🎯"/>
        <MetricCard label="Connections Sent" val={stats.connSent} cls="purple" icon="→"/>
        <MetricCard label="Connected" val={stats.connAccepted} sub={`${stats.connRate}% accept rate`} cls="cyan" icon="✓"/>
        <MetricCard label="Messages Sent" val={stats.msgSent} cls="amber" icon="✉"/>
        <MetricCard label="Replies" val={stats.replied} sub={`${stats.replyRate}% reply rate`} cls="green" icon="↩"/>
        <MetricCard label="Voice Notes" val={stats.vnSent} cls="pink" icon="🎙"/>
        <MetricCard label="Calls Booked" val={stats.callBooked} sub={`${stats.bookRate}% book rate`} cls="amber" icon="📅"/>
        <MetricCard label="Closed Won" val={stats.closed} sub={`$${(stats.rev/1000).toFixed(0)}K revenue`} cls="green" icon="💰"/>
      </div>
      <div className="grid-3" style={{marginBottom:20}}>
        <div className="stat-card red">
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div className="stat-val">{stats.overdue}</div><div className="stat-label">Overdue Follow-Ups</div><div className="stat-sub">Needs immediate attention</div></div>
            <div style={{fontSize:24}}>🚨</div>
          </div>
        </div>
        <div className="stat-card green">
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div className="stat-val">{stats.partnerConfirmed}</div><div className="stat-label">Partners Confirmed</div><div className="stat-sub">Active brand partnerships</div></div>
            <div style={{fontSize:24}}>🤝</div>
          </div>
        </div>
        <div className="stat-card purple">
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div className="stat-val">${stats.rev.toLocaleString()}</div><div className="stat-label">Pipeline Value</div><div className="stat-sub">At $12K avg deal size</div></div>
            <div style={{fontSize:24}}>💵</div>
          </div>
        </div>
      </div>
      <div className="card">
        <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>Funnel Conversion</div>
        {[
          ["Prospects → Connected",stats.total,stats.connAccepted,"cyan"],
          ["Connected → Replied",stats.connAccepted,stats.replied,"green"],
          ["Replied → Call Booked",stats.replied,stats.callBooked,"amber"],
          ["Call Booked → Closed",stats.callBooked,stats.closed,"pink"],
        ].map(([label,from,to,color])=>{
          const pct=from>0?Math.round(to/from*100):0;
          return(
            <div key={label} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13}}>{label}</span>
                <span style={{fontSize:13,fontWeight:700,color:`var(--${color})`}}>{to} / {from} ({pct}%)</span>
              </div>
              <div style={{height:6,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:`var(--${color})`,borderRadius:3,transition:"width .3s"}}/>
              </div>
            </div>
          );
        })}
      </div>
      <div className="card" style={{marginTop:16}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Integrations Hub</div>
        <div className="grid-3">
          {[
            {name:"Apollo",desc:"Lead verification & email validation",status:"Configure",color:"var(--blue)",url:"https://app.apollo.io"},
            {name:"GHL (GoHighLevel)",desc:"Auto-trigger follow-up when call booked",status:"Configure",color:"var(--accent)",url:"https://app.gohighlevel.com"},
            {name:"Zapier",desc:"Automate handoffs between tools",status:"Configure",color:"var(--amber)",url:"https://zapier.com"},
            {name:"Calendly",desc:"Embed booking links in outreach CTAs",status:"Configure",color:"var(--accent2)",url:"https://calendly.com"},
            {name:"Asana",desc:"Auto-create tasks on high-interest stage",status:"Configure",color:"var(--pink)",url:"https://app.asana.com"},
            {name:"Slack",desc:"Real-time notifications on pipeline milestones",status:"Configure",color:"var(--green)",url:"https://slack.com"},
          ].map(int=>(
            <a key={int.name} href={int.url} target="_blank" rel="noreferrer" style={{textDecoration:"none"}}>
              <div className="card-sm" style={{cursor:"pointer",transition:"border-color .15s",borderColor:"var(--border)"}} onMouseEnter={e=>e.currentTarget.style.borderColor=int.color} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
                <div style={{fontWeight:700,fontSize:13,color:int.color,marginBottom:4}}>{int.name}</div>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:8}}>{int.desc}</div>
                <span style={{fontSize:10,background:`${int.color}18`,color:int.color,padding:"2px 8px",borderRadius:6,fontWeight:700}}>→ {int.status}</span>
              </div>

          ))}

      </div>
    </div>
  );

/* ═══════════════════════════════════════════
   PROSPECT DATABASE
═══════════════════════════════════════════ */
function ProspectDB({leads,setLeads}){
  const[filterSeg,setFilterSeg]=useState("all");
  const[filterSize,setFilterSize]=useState("all");
  const[filterStage,setFilterStage]=useState("all");
  const[filterOverdue,setFilterOverdue]=useState(false);
  const[search,setSearch]=useState("");
  const[page,setPage]=useState(1);
  const[sortBy,setSortBy]=useState("score");
  const[activeLead,setActiveLead]=useState(null);
  const PER_PAGE=50;

  const updateLead=(id,field,val)=>{
    setLeads(prev=>prev.map(l=>l.id===id?{...l,[field]:val}:l));
  };

  const filtered=useMemo(()=>{
    let list=[...leads];
    if(filterSeg!=="all")list=list.filter(l=>l.segment===filterSeg);
    if(filterSize!=="all")list=list.filter(l=>(l.size||l.sz||"sme")===filterSize);
    if(filterStage!=="all")list=list.filter(l=>(l.pipeline||"not_contacted")===filterStage);
    if(filterOverdue)list=list.filter(l=>isOverdue(l));
    if(search)list=list.filter(l=>`${l.name} ${l.company} ${l.title}`.toLowerCase().includes(search.toLowerCase()));
    if(sortBy==="score")list.sort((a,b)=>calcScore(b)-calcScore(a));
    else if(sortBy==="overdue")list.sort((a,b)=>(isOverdue(b)?1:0)-(isOverdue(a)?1:0));
    else if(sortBy==="company")list.sort((a,b)=>(a.company||"").localeCompare(b.company||""));
    return list;
  },[leads,filterSeg,filterSize,filterStage,filterOverdue,search,sortBy]);

  const totalPages=Math.ceil(filtered.length/PER_PAGE);
  const page_leads=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);
  const overdue_count=leads.filter(l=>isOverdue(l)).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:20}}>
        <div>
          <div className="page-title">🎯 WAI Prospect Pipeline</div>
          <div className="page-sub">{leads.length.toLocaleString()} prospects · {filtered.length} shown{overdue_count>0&&<span style={{color:"var(--red)",fontWeight:700}}> · {overdue_count} overdue 🚨</span>}</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <input className="input" placeholder="Search..." value={search} onChange={e=>{setSearch(e.target.value);setPage(1)}} style={{width:160,padding:"8px 12px",fontSize:13}}/>
          <select className="select" value={filterSeg} onChange={e=>{setFilterSeg(e.target.value);setPage(1)}}>
            <option value="all">All Segments</option>
            {Object.entries(CLIENT_SEGMENTS).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}
          </select>
          <select className="select" value={filterSize} onChange={e=>{setFilterSize(e.target.value);setPage(1)}}>
            <option value="all">All Sizes</option>
            {Object.entries(SIZE_TIERS).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}
          </select>
          <select className="select" value={filterStage} onChange={e=>{setFilterStage(e.target.value);setPage(1)}}>
            <option value="all">All Stages</option>
            {Object.entries(PIPELINE_STAGES).map(([k,s])=><option key={k} value={k}>{s.icon} {s.label}</option>)}
          </select>
          <select className="select" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="score">Sort: Score ↓</option>
            <option value="overdue">Sort: Overdue First</option>
            <option value="company">Sort: Company A-Z</option>
          </select>
          <button className="btn btn-secondary btn-sm" onClick={()=>setFilterOverdue(f=>!f)} style={{borderColor:filterOverdue?"var(--red)":"var(--border)",color:filterOverdue?"var(--red)":"var(--text)",background:filterOverdue?"rgba(239,68,68,.1)":"transparent"}}>
            🚨 Overdue Only
          </button>
        </div>
      </div>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
        <table className="table">
          <colgroup>
            <col style={{width:"18%"}}/><col style={{width:"12%"}}/><col style={{width:"14%"}}/><col style={{width:"7%"}}/><col style={{width:"7%"}}/><col style={{width:"8%"}}/><col style={{width:"8%"}}/><col style={{width:"8%"}}/><col style={{width:"8%"}}/><col style={{width:"10%"}}/>
          </colgroup>
          <thead>
            <tr>
              <th>Prospect</th><th>Links</th><th>Pipeline Stage</th><th>Score</th><th>Size</th><th>Segment</th><th>Seq Day</th><th>Follow-Up</th><th>Overdue</th><th>Actions</th>
            </tr>
          </thead>
          <tbody>
            {page_leads.map((ld)=>{
              const score=calcScore(ld);
              const seg=CLIENT_SEGMENTS[ld.segment]||CLIENT_SEGMENTS.general;
              const sz=SIZE_TIERS[ld.size||ld.sz||"startup"]||SIZE_TIERS.startup;
              const days=daysSince(ld.seqStartDate);
              const nf=nextFollowUp(ld);
              const od=isOverdue(ld)&&(ld.pipeline||"not_contacted")!=="closed"&&(ld.pipeline||"not_contacted")!=="not_interested";
              return(
                <tr key={ld.id} className={od?"overdue":""}>
                  <td>
                    <div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ld.name||"—"}</div>
                    <div style={{color:"var(--muted)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ld.title}</div>
                    <div style={{color:"var(--muted)",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><strong style={{color:"var(--text)"}}>{ld.company}</strong></div>
                  </td>
                  <td>
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <EditField value={ld.website} placeholder="Website" type="url" onSave={v=>updateLead(ld.id,"website",v)}/>
                      <EditField value={ld.linkedin} placeholder="LinkedIn" type="url" onSave={v=>updateLead(ld.id,"linkedin",v)}/>
                      <EditField value={ld.email} placeholder="Email" type="email" onSave={v=>updateLead(ld.id,"email",v)}/>
                    </div>
                  </td>
                  <td><PipelineSelect value={ld.pipeline||"not_contacted"} onChange={v=>updateLead(ld.id,"pipeline",v)}/></td>
                  <td>
                    <div style={{fontWeight:800,fontSize:16,color:score>=5?"var(--green)":score>=2?"var(--amber)":"var(--muted)"}}>{score}</div>
                    <div className="score-bar"><div className="score-fill" style={{width:`${Math.min(score/10*100,100)}%`}}/></div>
                  </td>
                  <td><span className="tag" style={{background:`${sz.color}15`,color:sz.color}}>{sz.icon} {sz.label.split(" ")[0]}</span></td>
                  <td><span className="tag" style={{background:`${seg.color}15`,color:seg.color,fontSize:9}}>{seg.icon} {seg.label.split(" /")[0]}</span></td>
                  <td>
                    {ld.seqStartDate?
                      <span style={{fontSize:12,fontWeight:700,color:"var(--accent2)"}}>Day {days}</span>:
                      <button className="btn btn-secondary btn-sm" onClick={()=>updateLead(ld.id,"seqStartDate",new Date().toISOString().slice(0,10))} style={{fontSize:10,padding:"3px 7px"}}>▶ Start</button>
                    }
                  </td>
                  <td>
                    {nf?<span style={{fontSize:11,color:od?"var(--red)":"var(--muted)",fontWeight:od?700:400}}>Day {nf}</span>:
                      ld.seqStartDate?<span style={{fontSize:11,color:"var(--green)"}}>Complete</span>:<span style={{color:"var(--muted)",fontSize:11}}>—</span>}
                  </td>
                  <td>{od?<span className="badge" style={{background:"rgba(239,68,68,.1)",color:"var(--red)"}}>🚨 Overdue</span>:<span style={{color:"var(--muted)",fontSize:11}}>—</span>}</td>
                  <td>
                    <div style={{display:"flex",gap:4}}>
                      <button className="btn btn-primary btn-sm" onClick={()=>setActiveLead(ld)}>Scripts</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        </div>
        <div style={{padding:"12px 20px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{color:"var(--muted)",fontSize:13}}>Showing <strong style={{color:"var(--text)"}}>{(page-1)*PER_PAGE+1}</strong>–<strong style={{color:"var(--text)"}}>{Math.min(page*PER_PAGE,filtered.length)}</strong> of <strong style={{color:"var(--text)"}}>{filtered.length.toLocaleString()}</strong></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-secondary btn-sm" disabled={page===1} onClick={()=>setPage(p=>p-1)}>← Prev</button>
            <span style={{fontSize:13,fontWeight:700}}>{page}/{totalPages||1}</span>
            <button className="btn btn-secondary btn-sm" disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)}>Next →</button>
          </div>
        </div>
      </div>
      {activeLead&&<OutreachPanel lead={activeLead} onClose={()=>setActiveLead(null)}/>}
    </div>
  );
}

  {id:"asset-4",name:"Ashley in Afrika Website",type:"Social",link:"https://ashleyinafrika.com",stage:"All",desc:"Main website — send prospects here to validate credibility and see the offer"},
  {id:"asset-5",name:"LinkedIn Company Page",type:"Social",link:"https://linkedin.com/company/ashleyinafrika",stage:"All",desc:"Ashley's LinkedIn — prospects will check this before replying. Make sure it's current."},
  {id:"asset-6",name:"BrandUp Client Testimonial Video",type:"Video",link:"",stage:"Touch 4 — Closing",desc:"Founder testimonial video showing results from the execution pod. Use at call booking stage."},
  {id:"asset-7",name:"Execution Pod Overview Deck",type:"Demo",link:"",stage:"Touch 4 — Closing",desc:"One-pager or deck showing how the pod is structured, timeline, and deliverables. Send when interest is confirmed."},
];

function ContentLibrary(){
  const[assets,setAssets]=useState(()=>load("aia_assets")||DEFAULT_ASSETS);
  const[editing,setEditing]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[newAsset,setNewAsset]=useState({name:"",type:"Lead Magnet",link:"",stage:"Touch 1",desc:""});

  useEffect(()=>{save("aia_assets",assets)},[assets]);

  const addAsset=()=>{
    if(!newAsset.name)return;
    setAssets(prev=>[...prev,{...newAsset,id:`asset-${Date.now()}`}]);
    setNewAsset({name:"",type:"Lead Magnet",link:"",stage:"Touch 1",desc:""});
    setShowAdd(false);
  };

  const deleteAsset=(id)=>setAssets(prev=>prev.filter(a=>a.id!==id));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div className="page-title">📚 Content & Lead Magnet Library</div>
          <div className="page-sub">All active assets ready for the Air Assistant to pull instantly during outreach</div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(s=>!s)}>+ Add Asset</button>
      </div>
      {showAdd&&(
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>New Asset</div>
          <div className="grid-2" style={{marginBottom:12}}>
            <input className="input" placeholder="Asset name" value={newAsset.name} onChange={e=>setNewAsset(p=>({...p,name:e.target.value}))}/>
            <select className="input" value={newAsset.type} onChange={e=>setNewAsset(p=>({...p,type:e.target.value}))}>
              {["Lead Magnet","Case Study","Demo","Booking Link","Social","Video","Template","Report","Other"].map(t=><option key={t}>{t}</option>)}
            </select>
            <input className="input" placeholder="URL / Link" value={newAsset.link} onChange={e=>setNewAsset(p=>({...p,link:e.target.value}))}/>
            <select className="input" value={newAsset.stage} onChange={e=>setNewAsset(p=>({...p,stage:e.target.value}))}>
              {["Touch 1","Touch 2","Touch 3","Touch 4","All","Voice Note","Call Booked"].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <textarea className="input" placeholder="Description / notes for AA" value={newAsset.desc} onChange={e=>setNewAsset(p=>({...p,desc:e.target.value}))} style={{height:60,resize:"vertical",marginBottom:12}}/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={addAsset}>Save Asset</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button>
          </div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:16}}>
        {assets.map(a=>(
          <div key={a.id} className="card" style={{position:"relative"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{a.name}</div>
                <div style={{display:"flex",gap:6}}>
                  <span className="tag" style={{background:"rgba(124,58,237,.15)",color:"var(--accent)"}}>{a.type}</span>
                  <span className="tag" style={{background:"rgba(6,182,212,.15)",color:"var(--accent2)"}}>{a.stage}</span>
                </div>
              </div>
              <button onClick={()=>deleteAsset(a.id)} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16,padding:"2px 6px"}}>✕</button>
            </div>
            <div style={{color:"var(--muted)",fontSize:12,marginBottom:12,lineHeight:1.6}}>{a.desc}</div>
            <div style={{display:"flex",gap:8}}>
              {a.link&&<a href={a.link} target="_blank" rel="noreferrer" className="btn btn-secondary btn-sm" style={{textDecoration:"none"}}>🔗 Open</a>}
              {a.link&&<CopyBtn text={a.link} label="Copy Link"/>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

const DEFAULT_OBJECTIONS=[
  {id:"obj-1",objection:"We already have a virtual assistant / EA",response:"What we deliver is different from a traditional VA. Our execution pods are pre-trained on your industry, tools, and workflow from day one — no 3-month learning curve. You get 3 team members working as a coordinated unit, not a single generalist. The output quality and speed is in a different category."},
  {id:"obj-2",objection:"How do I know the quality will be good?",response:"Every team member goes through our vetting and training program before deployment. We match based on your specific industry and tech stack. And you get a 30-day quality guarantee — if the pod isn't performing to your standards in the first 30 days, we replace them at no cost."},
  {id:"obj-3",objection:"I'm worried about communication and time zones",response:"Our pods are trained in async-first communication — detailed Loom updates, clear task documentation, and proactive status reporting. Most of our founders say communication actually improves when they work with us because everything is documented. Time zone overlap is built into matching."},
  {id:"obj-4",objection:"This seems expensive / what's the ROI?",response:"Compare it to what you're spending now — your own time on ops work, local contractor costs, or the growth you're leaving on the table because you're in the weeds. Our pods typically cost less than one local US hire. Founders who work with us get back 15-25 hours per week within the first month."},
  {id:"obj-5",objection:"I'm not sure I have enough work for a full team",response:"That's exactly the right size for us. Our pods are structured for founders who are scaling — they flex with your workload and are cross-trained to cover multiple functions. You don't need to have it all figured out before we start."},
  {id:"obj-6",objection:"I've had bad experiences with remote workers before",response:"We hear this a lot — and it's usually because the hire wasn't properly vetted or trained for the role. Our model is different: we select for your specific industry, pre-train on your tools and workflows, and there's an AA Operations team behind every pod. You're not managing alone."},
  {id:"obj-7",objection:"Can I start with just one person instead of a pod?",response:"Absolutely — we can start with a single specialist and scale to a pod as you grow. Most founders start with one focused role (support, admin, or ops) and expand once they see the impact. We build the engagement around where you are right now."},
  {id:"obj-8",objection:"How quickly can you get someone started?",response:"Typically 2 weeks from agreement to first day. We handle sourcing, vetting, training, and onboarding. You get a simple onboarding call with us and your new team member — and then they're running."},
];

function ObjectionLibrary(){
  const[objections,setObjections]=useState(()=>load("aia_objections")||DEFAULT_OBJECTIONS);
  const[showAdd,setShowAdd]=useState(false);
  const[newObj,setNewObj]=useState({objection:"",response:""});
  const[search,setSearch]=useState("");

  useEffect(()=>{save("aia_objections",objections)},[objections]);

  const filtered=objections.filter(o=>`${o.objection} ${o.response}`.toLowerCase().includes(search.toLowerCase()));

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div>
          <div className="page-title">🛡️ Objection Handling Library</div>
          <div className="page-sub">Pre-approved responses — AA can respond immediately without escalating to Ashley or EO</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input className="input" placeholder="Search objections..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:200,padding:"8px 12px",fontSize:13}}/>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(s=>!s)}>+ Add Objection</button>
        </div>
      </div>
      {showAdd&&(
        <div className="card" style={{marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>New Objection + Response</div>
          <textarea className="input" placeholder="The objection..." value={newObj.objection} onChange={e=>setNewObj(p=>({...p,objection:e.target.value}))} style={{height:60,resize:"vertical",marginBottom:10}}/>
          <textarea className="input" placeholder="Pre-approved response..." value={newObj.response} onChange={e=>setNewObj(p=>({...p,response:e.target.value}))} style={{height:100,resize:"vertical",marginBottom:10}}/>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={()=>{if(!newObj.objection)return;setObjections(p=>[...p,{...newObj,id:`obj-${Date.now()}`}]);setNewObj({objection:"",response:""});setShowAdd(false)}}>Save</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setShowAdd(false)}>Cancel</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {filtered.map(o=>(
          <div key={o.id} className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--red)"}}>"<em>{o.objection}</em>"</div>
              <button onClick={()=>setObjections(p=>p.filter(x=>x.id!==o.id))} style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:14}}>✕</button>
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",fontSize:13,color:"var(--muted)",lineHeight:1.7,marginBottom:10}}>{o.response}</div>
            <CopyBtn text={o.response} label="Copy Response"/>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(()=>load("aia_user"));
  const[view,setView]=useState("dashboard");
  const[leads,setLeads]=useState([]);
  const[partners,setPartners]=useState([]);
  const[loading,setLoading]=useState(true);

  // Persist leads and partners
  useEffect(()=>{if(leads.length>0)save("aia_clients",leads)},[leads]);
  useEffect(()=>{if(partners.length>0)save("aia_partners",partners)},[partners]);

  // Load on mount
  useEffect(()=>{
    // Load clients
    const saved=load("aia_clients");
    if(saved&&saved.length>0){
      // Merge website URLs from embedded data
      let merged=saved.map(l=>({...l,size:l.size||l.sz||"sme",pipeline:l.pipeline||"not_contacted"}));
      if(typeof EMBEDDED_CLIENTS!=="undefined"){
        const urlMap=new Map();
        EMBEDDED_CLIENTS.forEach(p=>{if(p.w)urlMap.set((p.c||"").toLowerCase().trim(),p.w)});
        merged=merged.map(l=>{const key=(l.company||"").toLowerCase().trim();return(!l.website&&urlMap.has(key))?{...l,website:urlMap.get(key)}:l});
      }
      setLeads(merged);setLoading(false);
    } else if(typeof EMBEDDED_CLIENTS!=="undefined"&&EMBEDDED_CLIENTS.length>0){
      const embedded=AIA_CLIENTS.map((p,i)=>({id:p.id||`aia-${i}`,name:p.n,title:p.t,company:p.c,location:p.l,website:p.w||"",linkedin:p.li||"",email:p.e||"",segment:p.seg,size:p.sz||"startup",status:"New",pipeline:"not_contacted",signal:p.sig||"",reason:p.r||""}));
      setLeads(embedded);setLoading(false);
    } else {setLoading(false)}

    // Load partners
    const savedP=load("aia_partners");
    if(savedP&&savedP.length>0){setPartners(savedP)}
    else if(typeof EMBEDDED_PARTNERS!=="undefined"&&EMBEDDED_PARTNERS.length>0){
      const ep=EMBEDDED_PARTNERS.map((p,i)=>({id:p.id||`bp-${i}`,n:p.n,t:p.t,c:p.c,l:p.l,w:p.w||"",li:p.li||"",e:p.e||"",seg:p.seg,s:"New",sig:p.sig||"",r:p.r||"",partnerStage:"identified",audienceSize:"",collabType:"referral",nextAction:""}));
      setPartners(ep);save("aia_partners",ep);
    }
  },[]);

  const handleAuth=(u)=>{setUser(u);save("aia_user",u)};
  const handleLogout=()=>{setUser(null);localStorage.removeItem("aia_user")};

  if(!user)return <AuthGate onAuth={handleAuth}/>;

  const overdue_count=leads.filter(l=>isOverdue(l)&&(l.pipeline||"not_contacted")!=="closed"&&(l.pipeline||"not_contacted")!=="not_interested").length;

  const NAV=[
    {section:"Analytics"},
    {id:"dashboard",label:"Dashboard",icon:"📊"},
    {section:"Pipeline"},
    {id:"clients",label:"Prospects",icon:"🎯",badge:leads.length,hotBadge:overdue_count},
    {id:"partners",label:"Brand Partners",icon:"🤝",badge:partners.length},
    {section:"Resources"},
    {id:"scripts",label:"Outreach Scripts",icon:"⚡"},
    {id:"objections",label:"Objection Library",icon:"🛡️"},
    {id:"content",label:"Content Library",icon:"📚"},
    {id:"voice",label:"Founder Voice",icon:"📖"},
  ];

  if(loading)return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><div style={{textAlign:"center"}}><div style={{fontSize:48,marginBottom:12}}>🚀</div><h2>Loading WAI OS...</h2></div></div>;

  return(
    <div className="app">
      <button className="logout-btn" onClick={handleLogout}>Logout</button>
      <div className="sidebar">
        <div className="sidebar-brand">
          <div className="brand-logo">A</div>
          <div className="brand-name">Ashley in Afrika</div>
          <div className="brand-sub">Operating System</div>
        </div>
        <div style={{padding:"4px 0 8px"}}>
          {NAV.map((item,i)=>item.section?
            <div key={i} className="nav-section">{item.section}</div>:
            <div key={item.id} className={`nav-item${view===item.id?" active":""}`} onClick={()=>setView(item.id)}>
              <span style={{fontSize:15}}>{item.icon}</span>
              <span>{item.label}</span>
              {item.badge&&<span className="nav-badge">{item.badge}</span>}
              {item.hotBadge>0&&<span className="nav-badge hot">🚨{item.hotBadge}</span>}
            </div>
          )}
        </div>
        <div style={{marginTop:"auto",padding:"12px 16px",borderTop:"1px solid var(--border)"}}>
          <div style={{fontSize:11,color:"var(--muted)"}}>Logged in as</div>
          <div style={{fontSize:13,fontWeight:700}}>{user.name}</div>
          <div style={{fontSize:10,color:"var(--accent)",textTransform:"uppercase",letterSpacing:".06em"}}>{user.role}</div>
        </div>
      </div>
      <div className="content">
        {view==="dashboard"&&<Dashboard leads={leads} partners={partners}/>}
        {view==="clients"&&<ProspectDB leads={leads} setLeads={setLeads}/>}
        {view==="partners"&&<PartnerTracker partners={partners} setPartners={setPartners}/>}
        {view==="scripts"&&(
          <div>
            <div className="page-title">⚡ Outreach Scripts Reference</div>
            <div className="page-sub">Go to Prospects and click "Scripts" on any lead to generate personalized scripts</div>
            <div className="card" style={{marginTop:20}}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Quick Reference — WAI 3-Step Sequence</div>
              {[
                {step:"Step 1",title:"Initial Curiosity Message (LinkedIn DM)",desc:"Lead with the rework problem. Size-aware: SME gets founder-to-founder, MME gets growth-stage, BME gets executive framing. Never mention pricing. End with a soft 15-minute ask.",color:"var(--blue)"},
                {step:"Step 2",title:"Voice Note (from Tim upon positive response)",desc:"Tim records a 60-second voice note. Warm, confident, specific to the firm. Mention one thing you noticed about their firm. Use Tim's quote: 'Getting you a version significantly better than what you were originally handed.'",color:"var(--accent)"},
                {step:"Step 3",title:"Demo or Replay Link (once they confirm interest)",desc:"Send the Calendly link or demo video. Keep the message short — they've already expressed interest. Confirm the time, send a 1-paragraph reminder of what we're showing them.",color:"var(--green)"},
              ].map(s=>(
                <div key={s.step} style={{padding:"14px 16px",borderLeft:`3px solid ${s.color}`,background:"var(--surface)",borderRadius:"0 10px 10px 0",marginBottom:10}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:6}}>
                    <span className="tag" style={{background:`${s.color}18`,color:s.color}}>{s.step}</span>
                    <span style={{fontWeight:700,fontSize:14}}>{s.title}</span>
                  </div>
                  <div style={{color:"var(--muted)",fontSize:13,lineHeight:1.7}}>{s.desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {view==="objections"&&<ObjectionLibrary/>}
        {view==="content"&&<ContentLibrary/>}
        {view==="voice"&&<FounderVoice/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
